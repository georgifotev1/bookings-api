basePath: /api/v1
consumes:
- application/json
definitions:
  github_com_georgifotev1_nuvelaone-api_internal_domain.AcceptInvitationRequest:
    properties:
      password:
        minLength: 8
        type: string
      password_confirm:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - password
    - password_confirm
    - token
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.CreateInvitationRequest:
    properties:
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        enum:
        - admin
        - member
        type: string
    required:
    - email
    - name
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
      timezone:
        type: string
    required:
    - email
    - name
    - password
    - timezone
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.Role:
    enum:
    - admin
    - owner
    - member
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleOwner
    - RoleMember
  github_com_georgifotev1_nuvelaone-api_internal_domain.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.User:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.Role'
      tenant_id:
        type: string
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  github_com_georgifotev1_nuvelaone-api_internal_domain.UserInvitation:
    properties:
      accepted:
        type: boolean
      created_at:
        type: string
      email:
        type: string
      expires_at:
        type: string
      id:
        type: string
      invited_by:
        type: string
      name:
        type: string
      phone:
        type: string
      role:
        type: string
      tenant_id:
        type: string
      token:
        type: string
    type: object
  github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for NuvelaOne application
  title: NuvelaOne API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password, returns access token
        and sets refresh token cookie
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate refresh token and clear cookie
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - RefreshToken: []
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Use refresh token cookie to get a new access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - RefreshToken: []
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email, password and name
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /invitations:
    get:
      description: List all pending invitations for the current tenant
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.UserInvitation'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List invitations
      tags:
      - invitations
    post:
      consumes:
      - application/json
      description: Create a new invitation to join the tenant (Pro tier only)
      parameters:
      - description: Invitation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.CreateInvitationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.UserInvitation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create invitation
      tags:
      - invitations
  /invitations/{id}:
    delete:
      description: Revoke (delete) a pending invitation
      parameters:
      - description: Invitation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke invitation
      tags:
      - invitations
  /invitations/{id}/resend:
    post:
      description: Resend an existing invitation with a new token (Pro tier only)
      parameters:
      - description: Invitation ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resend invitation
      tags:
      - invitations
  /invitations/accept:
    post:
      consumes:
      - application/json
      description: Accept an invitation and create an account
      parameters:
      - description: Accept invitation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.AcceptInvitationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      summary: Accept invitation
      tags:
      - invitations
  /me:
    get:
      description: Get the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /users:
    get:
      description: Get all users (admin/owner only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - users
  /users/{id}:
    delete:
      description: Delete a user by ID (admin/owner only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Get a specific user by ID (admin/owner only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update a user's information (admin/owner only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_internal_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
produces:
- application/json
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
